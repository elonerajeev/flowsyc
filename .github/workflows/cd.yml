name: 🚀 CD — Deploy Backend to EC2 (Docker)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────
  validate:
    name: 🔍 Pre-deploy validation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install backend deps
        run: cd backend && npm ci

      - name: 🗄️ Validate Prisma schema
        run: cd backend && npx prisma validate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: 🔷 Backend typecheck
        run: cd backend && npx tsc --noEmit
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

  # ───────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy Backend to EC2 via Docker
    needs: validate
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Deploy via SSH (Docker Compose)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            cd /home/${{ secrets.EC2_USER }}/CRM

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Copying production env..."
            cp backend/.env.production backend/.env

            echo "🐳 Building and starting Docker containers..."
            docker-compose down || true
            docker-compose up -d --build

            echo "⏳ Waiting for services to start..."
            sleep 15

      - name: 🏥 Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            RESPONSE=$(curl -sf http://localhost:3000/api/health || echo "FAILED")
            echo "Health check response: $RESPONSE"
            if echo "$RESPONSE" | grep -q "FAILED"; then
              echo "❌ Health check failed!"
              exit 1
            fi
            echo "✅ Backend deployment successful!"

      - name: 📢 Notify deployment success
        if: success()
        run: |
          echo "✅ Backend deployed to EC2 successfully!"
          echo "   Commit: ${{ github.sha }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Actor:  ${{ github.actor }}"

      - name: 📢 Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED!"
          echo "   Commit: ${{ github.sha }}"
          echo "   Actor:  ${{ github.actor }}"
          echo "   Check GitHub Actions logs for details."
