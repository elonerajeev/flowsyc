databases:
  - name: focalpoint-db
    databaseName: focal_point_compass
    user: crm_user
    plan: starter

services:
  # ──────────────────────────────────────
  # Backend — Express API + Socket.IO
  # ──────────────────────────────────────
  - type: web
    name: focalpoint-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    healthCheckPath: /api/health
    scaling:
      minInstances: 1
      maxInstances: 1

    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: focalpoint-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: focalpoint-db
          property: connectionString

      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: COOKIE_SECRET
        sync: false

      - key: FRONTEND_URL
        value: https://flowsyc-svuj.vercel.app

      - key: REDIS_URL
        sync: false
      - key: VALKEY_URL
        sync: false

      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_CALENDAR_REDIRECT_URI
        sync: false

      - key: AUDIT_RETENTION_DAYS
        value: "30"
